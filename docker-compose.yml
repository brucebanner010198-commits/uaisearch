services:
  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "127.0.0.1:9200:9200"  # security plugin disabled — must never be reachable off-host
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9200"]
      interval: 10s
      retries: 30
    restart: unless-stopped

  app:
    build: .
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - TARGET_DOMAINS=${TARGET_DOMAINS}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
    ports:
      - "127.0.0.1:8000:8000"  # public traffic goes through caddy so TLS and X-Forwarded-For rate limiting can't be bypassed
    restart: unless-stopped

  crawler:
    build: .
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - SEED_URLS=${SEED_URLS}
      - MAX_PAGES=200
      - FRONTIER_STATE_PATH=/data/frontier.json
    volumes:
      - crawler-data:/data
    entrypoint: ["sh", "-c", "while true; do if python scripts/run_crawler.py; then sleep 86400; else echo 'crawler run failed; retrying in 15m'; sleep 900; fi; done"]
    restart: unless-stopped

  local-llm:
    image: ollama/ollama:0.9.6
    profiles: ["local-llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  caddy:
    image: caddy:2.8
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
    environment:
      - DOMAIN=${DOMAIN}
    restart: unless-stopped

volumes:
  opensearch-data:
  crawler-data:
  ollama-data:
  caddy-data:
